<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/logo.png" />
    <link rel="apple-touch-icon" href="/brand/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <title>Football Data Management</title>
    <script>
      // Applique le thème avant le rendu (évite le flash clair au chargement).
      (function () {
        try {
          // Défaut = clair ; sombre uniquement si l'utilisateur l'a choisi.
          if (localStorage.getItem("fdm_theme") === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
